<script>
(function(){
  "use strict";

  // Optimized Hero Interaction
  (function heroInteraction(){
    const hero = document.getElementById('hero');
    const content = document.getElementById('hero-content');
    
    // Smooth Scroll Parallax
    window.addEventListener('scroll', () => {
      const scrolled = window.scrollY;
      if (scrolled < window.innerHeight) {
        requestAnimationFrame(() => {
          content.style.transform = `translateY(${scrolled * 0.4}px)`;
          content.style.opacity = Math.max(0, 1 - (scrolled / 500));
        });
      }
    }, { passive: true });

    // 3D Tilt Effect on Desktop
    hero.addEventListener('mousemove', (e) => {
      if(window.innerWidth < 1024) return;
      const { clientX, clientY } = e;
      const x = (clientX / window.innerWidth - 0.5) * 20;
      const y = (clientY / window.innerHeight - 0.5) * 20;
      content.style.transform = `perspective(1000px) rotateY(${x}deg) rotateX(${-y}deg)`;
    });

    // Reset tilt on leave
    hero.addEventListener('mouseleave', () => {
      content.style.transform = `perspective(1000px) rotateY(0deg) rotateX(0deg)`;
    });
  })();

  // ... (Keep your existing scripts below)
})();
</script>
