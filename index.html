<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subhadip Sengupta | Portfolio</title>
    <style>
        :root { --bg: #060606; --text: #e8e8e8; --accent: #ff3333; }
        
        body { 
            background: var(--bg); color: var(--text); 
            font-family: 'Inter', sans-serif; line-height: 1.6;
            margin: 0; padding: 0;
        }

        /* Responsive Navigation */
        nav { padding: 2rem 5vw; display: flex; justify-content: space-between; }
        .nav-links { display: flex; gap: 2rem; list-style: none; }

        /* Fluid Layout */
        .container { max-width: 1200px; margin: 0 auto; padding: 0 5vw; }
        
        /* Mobile First Grid */
        .grid { 
            display: grid; 
            grid-template-columns: 1fr; 
            gap: 2rem; 
        }

        @media (min-width: 768px) {
            .grid { grid-template-columns: repeat(2, 1fr); }
        }

        h1 { font-size: clamp(3rem, 8vw, 7rem); line-height: 1; }
    </style>
</head>
<body>

    <nav>
        <div>SUBHADIP.DEV</div>
        <ul class="nav-links">
            <li>Work</li>
            <li>Stack</li>
            <li>Contact</li>
        </ul>
    </nav>

    <main class="container">
        <section style="height: 80vh; display: flex; flex-direction: column; justify-content: center;">
            <div style="color: var(--accent);">DEVELOPER PROFILE</div>
            <h1>Subhadip<br>Sengupta</h1>
        </section>
        
        </main>
</body>
</html>
