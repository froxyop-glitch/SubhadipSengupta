<style>
/* ============================================================
   TOKENS — Optimized for 60fps
   ============================================================ */
:root{
  --void:        #0a0a0a;
  --ink:         #131110;
  --ink-soft:    #1c1815;
  --blood:       #8a0303;
  --ember:       #c4291a;
  --gold:        #b8923a;
  --silver:      #d8d4c8;
  --paper:       #f3efe4;
  --ash:         #5a554d;
  --line:        rgba(216,212,200,0.10);

  --font-display:'Cinzel', serif;
  --font-body:   'Inter', system-ui, sans-serif;
  --font-mono:   'JetBrains Mono', ui-monospace, monospace;

  --max-w: 1180px;
  --pad: clamp(1.5rem, 5vw, 4rem);
  --ease: cubic-bezier(.19, 1, 0.22, 1); /* Smoother easing curve */
}

*{ margin:0; padding:0; box-sizing:border-box; }
html{
  background:var(--void);
  scroll-behavior:smooth;
  scroll-snap-type: y proximity;
  -webkit-overflow-scrolling: touch;
}
body{
  background:var(--void);
  color:var(--paper);
  font-family:var(--font-body);
  line-height:1.6;
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
}

/* GPU Acceleration */
.card, .reveal, .tsuba, .btn-draw, .rail button, .hero-content {
  will-change: transform, opacity;
  backface-visibility: hidden;
  perspective: 1000px;
}

/* Existing styles preserved... */
.card{
  background:var(--ink); border:1px solid var(--line);
  padding:2rem; position:relative; overflow:hidden;
  transition:transform 0.6s var(--ease), border-color .35s, background .35s;
}

@keyframes pulse {
  0% { box-shadow: 0 0 0 0 rgba(138, 3, 3, 0.4); }
  70% { box-shadow: 0 0 0 15px rgba(138, 3, 3, 0); }
  100% { box-shadow: 0 0 0 0 rgba(138, 3, 3, 0); }
}

.btn-draw:hover { animation: pulse 1.5s infinite; }

<script>
(function(){
  "use strict";

  // Existing functionality preserved...

  // New Performance & Dynamic Enhancements
  (function dynamicMotion(){
    const hero = document.getElementById('hero');
    const content = document.getElementById('hero-content');
    
    // Parallax & Tilt Effect
    hero.addEventListener('mousemove', (e) => {
      if(window.innerWidth < 1024) return;
      const x = (e.clientX / window.innerWidth - 0.5) * 20;
      const y = (e.clientY / window.innerHeight - 0.5) * 20;
      content.style.transform = `perspective(1000px) rotateY(${x}deg) rotateX(${-y}deg)`;
    });

    hero.addEventListener('mouseleave', () => {
      content.style.transform = `perspective(1000px) rotateY(0deg) rotateX(0deg)`;
    });
  })();

  // Optimized Scroll Listener
  (function optimizedParallax(){
    const bg = document.getElementById('forest-bg');
    const content = document.getElementById('hero-content');
    window.addEventListener('scroll', () => {
      if(window.scrollY < window.innerHeight) {
        requestAnimationFrame(() => {
          content.style.transform = `translateY(${window.scrollY * 0.4}px)`;
          content.style.opacity = Math.max(0, 1 - (window.scrollY / 500));
        });
      }
    }, { passive: true });
  })();

  // ... (Keep the rest of your original script functions)
})();
</script>
